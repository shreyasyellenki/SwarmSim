<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwarmSim</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e8eaed;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 12px 20px;
      border-bottom: 1px solid #2a2f3a;
      font-size: 18px;
      font-weight: 600;
    }
    main {
      flex: 1;
      display: flex;
      min-height: 0;
    }
    #canvas-container {
      flex: 3;
      position: relative;
    }
    #stats-panel {
      flex: 1;
      padding: 20px;
      border-left: 1px solid #2a2f3a;
      min-width: 220px;
    }
    .stat {
      margin-bottom: 16px;
    }
    .stat-label {
      font-size: 12px;
      color: #9aa0a6;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 600;
      margin-top: 4px;
    }
    #status {
      font-size: 13px;
      color: #9aa0a6;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <header>SwarmSim — Live Swarm Exploration</header>
  <main>
    <div id="canvas-container"></div>
    <aside id="stats-panel">
      <div class="stat">
        <div class="stat-label">Coverage</div>
        <div class="stat-value" id="coverage">0%</div>
      </div>
      <div class="stat">
        <div class="stat-label">Step</div>
        <div class="stat-value" id="step">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Agents</div>
        <div class="stat-value" id="agent-count">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Comm Links</div>
        <div class="stat-value" id="comm-count">0</div>
      </div>
      <div id="status">Connecting...</div>
    </aside>
  </main>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
      }
    }
  </script>
  <script type="module" src="/static/scene.js"></script>
</body>
</html>

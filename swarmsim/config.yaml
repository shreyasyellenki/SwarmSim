# SwarmSim — single source of truth for all hyperparameters.
# Change one section at a time when tuning.

stage1_mujoco:
  xml_path: env/mujoco_drone.xml
  obs_dim: 9
  action_dim: 4
  episode_horizon: 500
  success_radius: 0.3
  waypoint_range:
    x: [-2.0, 2.0]
    y: [-2.0, 2.0]
    z: [0.8, 2.5]
  spawn_range:
    x: [-0.5, 0.5]
    y: [-0.5, 0.5]
    z: [0.8, 1.5]
  reward:
    distance_scale: 1.0
    success_bonus: 10.0
    alive_bonus: 0.01
    crash_penalty: 5.0

ppo:
  rollout_steps: 2048
  num_epochs: 10
  minibatch_size: 64
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  learning_rate: 0.0003
  max_grad_norm: 0.5

training:
  total_timesteps: 500000
  swarm_total_timesteps: 1000000
  log_interval: 10
  save_interval: 50
  weights_dir: weights
  mujoco_policy: mujoco_policy.pt
  swarm_policy: swarm_policy.pt
  tensorboard_dir: runs

env:
  num_agents: 6
  grid_size: 32
  local_window_k: 5
  comm_radius: 8
  max_neighbors: 3
  episode_horizon: 500
  coverage_target: 0.85
  world_size: 1.0
  global_map_downsample: 8   # actor sees a DxD coarse coverage map (0 disables). See STORYLINE Exp 3.

reward:
  alpha: 1.0
  beta: 0.1
  gamma: 0.3          # revisit penalty (bumped from 0.01 after gamma sweep; see STORYLINE.md)

policy:
  init_log_std: 0.0   # initial log std of movement Gaussian (std=exp(this)); lower = less action noise
  std_schedule:
    enabled: false
    start_log_std: 0.0    # std=1.0 early (explore)
    end_log_std: -1.6      # std≈0.20 late (commit to mean policy)
  entropy_schedule:
    enabled: false
    start: 0.01
    end: 0.001

comm:
  message_dim: 8
  mode: full

critic:
  grid_downsample: 8

demo:
  sim_hz: 12              # simulation steps per second (watchable; was unlimited)
  deterministic: true     # use mean actions, not noisy samples

eval:
  num_seeds: 50
  episodes_per_seed: 20
  metric: time_to_90pct_coverage
  coverage_threshold: 0.90
  seeds:
